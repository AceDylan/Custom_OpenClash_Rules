;Custom_OpenClash_Rules
;全分组防 DNS 泄漏订阅转换模板
;作者：https://github.com/Aethersailor
;项目地址：https://github.com/Aethersailor/Custom_OpenClash_Rules
;基于 ACL4SSR 模板魔改而来，感谢原作者！
;<必须>搭配本项目配套教程，实现最佳化的 OpenClash 使用效果！
;教程：https://github.com/Aethersailor/Custom_OpenClash_Rules/wiki/OpenClash-%E8%AE%BE%E7%BD%AE%E6%96%B9%E6%A1%88
;有问题可提 issue，或者加入本项目 Telegram 群组进行讨论
;Telegram 群组：https://t.me/custom_openclash_rules_group
;Telegram 通知频道：https://t.me/custom_openclash_rules
;建议加入通知频道或群组，谨防失联

[custom]
;设置规则标志位
;以下规则，按照从上往下的顺序遍历，优先命中上位规则，规则重复无影响
;修改顺序会影响分流效果

;本地地址和域名直连
ruleset=🇬 谷歌与AI,https://raw.githubusercontent.com/AceDylan/Custom_OpenClash_Rules/main/rule/Custom_Proxy_Google.list,28800
ruleset=🎯 全球直连,https://raw.githubusercontent.com/AceDylan/Custom_OpenClash_Rules/main/rule/Custom_Direct_my.list,28800
ruleset=🎥 流媒体,https://raw.githubusercontent.com/AceDylan/Custom_OpenClash_Rules/main/rule/Custom_Proxy_Emby.list,28800
ruleset=💬 社交媒体,https://raw.githubusercontent.com/AceDylan/Custom_OpenClash_Rules/main/rule/Custom_Proxy_Media.list,28800
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve
ruleset=🎯 全球直连,[]GEOSITE,paypal
;本项目收录的直连域名规则
ruleset=🎯 全球直连,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical.yaml,28800
;本项目收录的代理域名规则
ruleset=💬 社交媒体,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Classical.yaml,28800
;国内游戏域名强制直连
ruleset=🎯 全球直连,[]GEOSITE,category-games@cn
;Steam 下载 CDN 地址强制直连
ruleset=🎯 全球直连,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Steam_CDN_Classical.yaml,28800
;各大游戏平台下载域名强制直连
ruleset=🎯 全球直连,[]GEOSITE,category-game-platforms-download
;BT Tracker 相关域名强制直连
ruleset=🎯 全球直连,[]GEOSITE,category-public-tracker
;即时通讯包括了 Telegram/WhatsApp/Line 等海外主流即时通讯软件域名
ruleset=💬 社交媒体,[]GEOSITE,category-communication
;社交媒体包括了 Twitter(X)/Facebook/Instagram 等海外主流社交媒体
ruleset=💬 社交媒体,[]GEOSITE,category-social-media-!cn
ruleset=🇬 谷歌与AI,[]GEOSITE,openai
ruleset=🇬 谷歌与AI,[]GEOSITE,bing
ruleset=🇬 谷歌与AI,[]GEOSITE,category-ai-!cn
ruleset=💬 社交媒体,[]GEOSITE,github
;测速工具包括 SpeedTest 等主流测速工具域名
ruleset=⚡ 测速节点,[]GEOSITE,category-speedtest
ruleset=📹 油管,[]GEOSITE,youtube
ruleset=🎥 流媒体,[]GEOSITE,apple-tvplus
ruleset=Ⓜ️ 微软苹果,[]GEOSITE,apple
ruleset=Ⓜ️ 微软苹果,[]GEOSITE,microsoft
ruleset=🇬 谷歌与AI,[]GEOSITE,googlefcm
ruleset=🇬 谷歌与AI,[]GEOSITE,google
ruleset=🇬 谷歌与AI,[]GEOSITE,google-cn
ruleset=🎵 Tiktok,[]GEOSITE,tiktok
ruleset=🎥 流媒体,[]GEOSITE,netflix
ruleset=🎥 流媒体,[]GEOSITE,disney
ruleset=🎥 流媒体,[]GEOSITE,hbo
ruleset=🎥 流媒体,[]GEOSITE,primevideo
;Emby 包括主流 Emby 服务相关域名
ruleset=🎥 流媒体,[]GEOSITE,category-emby
ruleset=💬 社交媒体,[]GEOSITE,spotify
ruleset=💬 社交媒体,[]GEOSITE,bahamut
ruleset=💬 社交媒体,[]GEOSITE,steam
ruleset=💬 社交媒体,[]GEOSITE,category-games
ruleset=💬 社交媒体,[]GEOSITE,category-entertainment
ruleset=💬 社交媒体,[]GEOSITE,category-ecommerce
ruleset=💬 社交媒体,[]GEOSITE,gfw
ruleset=💬 社交媒体,[]GEOIP,telegram,no-resolve
ruleset=💬 社交媒体,[]GEOIP,twitter,no-resolve
ruleset=💬 社交媒体,[]GEOIP,facebook,no-resolve
ruleset=🇬 谷歌与AI,[]GEOIP,google,no-resolve
ruleset=🎥 流媒体,[]GEOIP,netflix,no-resolve
;由于 OpenClash 使用的大陆白名单收录不全，此处留有 geosite:cn 作为国内域名兜底
ruleset=🎯 全球直连,[]GEOSITE,cn
;由于 OpenClash 使用的大陆白名单收录不全，此处留有 geoip:cn 作为国内 IP 兜底
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve
;以上兜底规则会根据实际情况随时取消
ruleset=🔀 非标端口,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Port_Direct.yaml,28800
ruleset=🐟 漏网之鱼,[]FINAL
;设置规则标志位结束

