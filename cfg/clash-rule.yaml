  Custom_Proxy_Media:
    behavior: classical
    interval: 28800
    path: ./rule_provider/Custom_Proxy_Media.yaml
    type: http
    url: "https://raw.githubusercontent.com/AceDylan/Custom_OpenClash_Rules/main/rule/Custom_Proxy_Media.list"
