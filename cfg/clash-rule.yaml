  Custom_Direct:
    behavior: classical
    interval: 28800
    path: ./rule_provider/Custom_Direct_Classical.yaml
    type: http
    url: "https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical.yaml"
    proxy: DIRECT

  Custom_Proxy:
    behavior: classical
    interval: 28800
